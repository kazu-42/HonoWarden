name: Release Tag Verification

on:
  push:
    tags:
      - v0.1.0-alpha

permissions:
  contents: read

jobs:
  verify:
    name: Verify release tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Compatibility fixture test
        run: pnpm compat:test

      - name: Release gate preflight
        run: pnpm release:gate -- --strict

      - name: Release tag preflight
        run: pnpm release:tag:preflight -- --strict --allow-existing-tag

      - name: Repository brand scan
        run: pnpm brand:scan

      - name: Format check
        run: pnpm format
