name: Remote Backup

on:
  workflow_dispatch:
  schedule:
    - cron: '17 19 * * *'

permissions:
  contents: read

jobs:
  remote-backup:
    name: Export encrypted D1/R2 backup
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_HONOWARDEN_D1_R2_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      HONOWARDEN_BACKUP_ARCHIVE_PASSPHRASE: ${{ secrets.HONOWARDEN_BACKUP_ARCHIVE_PASSPHRASE }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify required secret-backed environment
        shell: bash
        run: |
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY HONOWARDEN_BACKUP_ARCHIVE_PASSPHRASE; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret-backed environment variable: ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Emit reviewed backup packet
        run: pnpm backup:schedule:packet

      - name: Set backup paths
        id: paths
        shell: bash
        run: |
          timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
          backup_out="test/.tmp/remote-backup-${timestamp}"
          evidence_out="${backup_out}-evidence.json"
          echo "backup_out=${backup_out}" >> "${GITHUB_OUTPUT}"
          echo "evidence_out=${evidence_out}" >> "${GITHUB_OUTPUT}"
          echo "archive=${RUNNER_TEMP}/honowarden-remote-backup-${timestamp}.tar.gz" >> "${GITHUB_OUTPUT}"
          echo "encrypted_archive=${RUNNER_TEMP}/honowarden-remote-backup-${timestamp}.tar.gz.enc" >> "${GITHUB_OUTPUT}"

      - name: Execute remote backup
        shell: bash
        run: |
          pnpm backup:export -- \
            --out "${{ steps.paths.outputs.backup_out }}" \
            --database honowarden \
            --bucket honowarden-vault-objects \
            --mode remote \
            --env production \
            --r2-list \
            --r2-prefix attachments/ \
            --execute

      - name: Write secret-safe backup evidence
        shell: bash
        run: |
          pnpm backup:evidence -- \
            --from "${{ steps.paths.outputs.backup_out }}" \
            --out "${{ steps.paths.outputs.evidence_out }}" \
            --source-commit "${GITHUB_SHA}" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Encrypt backup archive
        shell: bash
        run: |
          tar -C "$(dirname "${{ steps.paths.outputs.backup_out }}")" \
            -czf "${{ steps.paths.outputs.archive }}" \
            "$(basename "${{ steps.paths.outputs.backup_out }}")"
          openssl enc -aes-256-cbc -pbkdf2 -salt \
            -in "${{ steps.paths.outputs.archive }}" \
            -out "${{ steps.paths.outputs.encrypted_archive }}" \
            -pass env:HONOWARDEN_BACKUP_ARCHIVE_PASSPHRASE
          rm -f "${{ steps.paths.outputs.archive }}"

      - name: Upload encrypted backup artifact
        uses: actions/upload-artifact@v6
        with:
          name: honowarden-remote-backup-${{ github.run_id }}
          path: |
            ${{ steps.paths.outputs.encrypted_archive }}
            ${{ steps.paths.outputs.evidence_out }}
          retention-days: 7
          if-no-files-found: error

      - name: Remove plaintext backup directory
        if: always()
        shell: bash
        run: |
          rm -rf "${{ steps.paths.outputs.backup_out }}"
          rm -f "${{ steps.paths.outputs.archive }}"
