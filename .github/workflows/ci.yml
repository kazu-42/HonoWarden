name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Typecheck, lint, and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Compatibility fixture test
        run: pnpm compat:test

      - name: Release gate preflight
        run: pnpm release:gate

      - name: Repository brand scan
        run: |
          BLOCKED_PATTERN="$(printf '%s' '[Bb]it' 'warden|BIT' 'WARDEN|Bit' 'warden|bit' 'warden')"
          if rg -n "$BLOCKED_PATTERN" \
            --glob "!node_modules/**" \
            --glob "!pnpm-lock.yaml" \
            --glob "!LICENSE" \
            --glob "!dist/**" \
            --glob "!coverage/**" \
            --glob "!test/.tmp/**" \
            .
          then
            exit 1
          fi

      - name: Format check
        run: pnpm format
